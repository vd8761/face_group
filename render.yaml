services:
  # ── FastAPI Web Service ────────────────────────────────────────────────────
  - type: web
    name: photogroup-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter            # Free tier on Render
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SUPER_ADMIN_EMAIL
        value: admin@photogroup.app
      - key: SUPER_ADMIN_PASSWORD
        sync: false          # Set manually in Render dashboard
      - key: DATABASE_URL
        sync: false          # Paste your Neon DB connection string
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: face-group
      - key: REDIS_URL
        sync: false          # Paste your Upstash Redis URL
      - key: CORS_ORIGINS
        value: '["https://your-app.vercel.app"]'
      - key: DEBUG
        value: "false"
    healthCheckPath: /api/health

